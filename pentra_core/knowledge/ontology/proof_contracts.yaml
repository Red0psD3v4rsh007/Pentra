proof_contracts:
  - key: browser_execution_xss
    name: Browser execution XSS proof
    description: >
      Promote XSS only when browser-backed script execution is observed on the
      target route.
    proof_strength: browser_verified
    source_summary_keys:
      - portswigger_web_security_academy
      - owasp_wstg_stable
    required_evidence:
      - route_and_payload_identity
      - execution_observation
      - replayable_request_or_browser_steps
    positive_requirements:
      - script execution or equivalent browser-side sink activation observed
      - execution ties to attacker-controlled input
    negative_requirements:
      - plain string reflection without execution is insufficient
    replay_requirements:
      - deterministic route
      - payload capture
      - browser-verifier artifact
    prohibited_shortcuts:
      - reflection_only_promotion
      - static_sink_guess_without_execution
    candidate_tool_ids:
      - web_interact
      - custom_poc
    citations:
