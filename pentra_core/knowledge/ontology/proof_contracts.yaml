  - key: injection_replay_contract
    name: Injection replay proof
    description: >
      Promote injection only when controlled, replayable request deltas support
      the hypothesis.
    proof_strength: replayable
    source_summary_keys:
      - owasp_wstg_stable
      - portswigger_web_security_academy
    required_evidence:
      - baseline_request
      - mutated_request
      - reproducible_delta
    positive_requirements:
