  - key: role_differential_access_contract
    name: Role differential access proof
    description: >
      Access control or auth abuse claims require comparative replay across at
      least two identity states.
    proof_strength: replayable
    source_summary_keys:
      - owasp_wstg_stable
      - portswigger_web_security_academy
    required_evidence:
      - target_route
      - role_a_outcome
      - role_b_outcome
    positive_requirements:
      - same route or object behaves differently across roles in a way that
        violates intended access boundary
    negative_requirements:
      - single-role success is insufficient for access-control claims
    replay_requirements:
      - role model
      - request replay per role
      - preserved differential evidence
    prohibited_shortcuts:
      - anonymous_or_admin_only_claim_without_comparison
    candidate_tool_ids:
      - web_interact
      - custom_poc
    citations:
