facts:
  - fact_key: owasp_rest_security_api_constraints
    title: REST API security constraints
    fact_type: api_constraint_summary
    summary: >
      REST endpoints should enforce allowed methods, validate request and
      response content types, apply object-level access control, and treat JWT
      or bearer tokens as authorization context rather than proof of access.
    tags:
      - rest_api
      - content_type_validation
      - authorization
