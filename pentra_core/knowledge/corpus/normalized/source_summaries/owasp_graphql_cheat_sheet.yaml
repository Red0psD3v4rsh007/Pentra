    title: GraphQL attack-surface controls
    fact_type: api_attack_surface_summary
    summary: >
      GraphQL endpoints need explicit control over introspection, batching,
      depth, amount, and field-level authorization. Those features are the
      first-class signals for GraphQL-heavy target classification.
