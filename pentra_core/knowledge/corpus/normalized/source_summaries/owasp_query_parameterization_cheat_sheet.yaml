  - fact_key: owasp_query_parameterization_bind_variables
    title: Bind variables preserve query-shape stability
    fact_type: implementation_guidance
    summary: >
      Prepared statements and bind variables keep user-controlled data out of
      the query structure. Dynamic clauses that cannot be bound require
      application-side allowlists and explicit mapping.
