version: 1
program: phase10_public_source_first
default_profile: public_source_first
profiles:
  - key: public_source_first
    description: >
      Use official public standards, official project material, and local
      runtime truth first. Community public material is optional later.
      Credentialed or proprietary sources are blocked in Phase 0.
    allowed_trust_tiers:
      - official_public
      - official_project
      - runtime_truth
    optional_trust_tiers:
      - community_public
    blocked_trust_tiers:
      - credentialed_optional
      - proprietary_private
sources:
  - key: mitre_attack_enterprise
    title: MITRE ATT&CK Enterprise Matrix
    provider: MITRE
    trust_tier: official_public
    access_level: public
    source_types:
      - taxonomy
      - tactics_techniques
    authority_for:
      - attack_taxonomy
      - planner_action_taxonomy
      - capability_family_taxonomy
    version_policy: floating
    extraction_mode: browse
    urls:
      - https://attack.mitre.org/matrices/enterprise/
    notes: >
      Useful for tactic and technique structure, but not sufficient by itself
      for web exploit execution logic.

  - key: owasp_wstg_stable
    title: OWASP Web Security Testing Guide Stable
    provider: OWASP
    trust_tier: official_public
    access_level: public
    source_types:
      - methodology
      - testing_guide
    authority_for:
      - testing_methodology
      - attack_preconditions
      - verification_guidance
    version_policy: floating
    extraction_mode: browse
    urls:
      - https://owasp.org/www-project-web-security-testing-guide/stable/4-Web_Application_Security_Testing/

