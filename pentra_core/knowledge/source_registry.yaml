  - key: juice_shop_github_releases
    title: OWASP Juice Shop GitHub Releases
    provider: GitHub / OWASP Juice Shop
    trust_tier: official_project
    access_level: public
    source_types:
      - releases
      - version_metadata
    authority_for:
      - source_version_truth
      - release_drift_detection
    version_policy: source_pinned
    source_version: "19.1.1"
    extraction_mode: browse
    urls:
      - https://github.com/juice-shop/juice-shop/releases
    notes: >
      Used for public release indexing and version drift checks. The live local
      benchmark target can be newer than the latest indexed release page seen
      during browsing.

  - key: juice_shop_runtime_inventory_local_19_2_1
    title: Local Juice Shop Runtime Inventory
    provider: Pentra local benchmark runtime
    trust_tier: runtime_truth
    access_level: local_runtime
    source_types:
      - challenge_inventory
      - benchmark_truth
      - runtime_api
    authority_for:
      - benchmark_truth
      - challenge_inventory
      - target_version_truth
    version_policy: runtime_pinned
    target_key: juice_shop_local
    target_version: "19.2.1"
    artifact_path: .local/pentra/phase9/juice_shop_challenge_inventory_latest.json
    extraction_mode: runtime_api
    urls:
      - http://127.0.0.1:3001/api/Challenges
    notes: >
      This is the authoritative benchmark truth for the running local Juice
      Shop target in this checkout and must override historical challenge-count
      assumptions from mismatched versions.

