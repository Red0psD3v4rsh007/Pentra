name: ffuf
worker_family: web
image: secsi/ffuf:latest
command:
  - -u
  - "{base_url}/FUZZ"
  - -w
  - "{ffuf_wordlist}"
  - -rate
  - "{ffuf_rate_limit}"
  - -timeout
  - "5"
  - -maxtime
  - "60"
  - -mc
  - all
  - -o
  - "{output_dir}/ffuf.json"
  - -of
  - json
output_parser: json
artifact_type: endpoints
default_timeout: 900
