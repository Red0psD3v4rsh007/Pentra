name: nuclei
worker_family: vuln
image: projectdiscovery/nuclei:latest
command:
  - -l
  - "{nuclei_targets_file}"
  - -t
  - "{nuclei_templates_dir}"
  - -rl
  - "{nuclei_rate_limit}"
  - -disable-update-check
  - -silent
  - -jsonl
  - -o
  - "{output_dir}/nuclei.json"
output_parser: json
artifact_type: vulnerabilities
default_timeout: 1800
