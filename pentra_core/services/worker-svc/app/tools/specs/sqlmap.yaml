name: sqlmap
worker_family: vuln
image: parrotsec/sqlmap:latest
command:
  - -u
  - "{sqlmap_target_url}"
  - --batch
  - --flush-session
  - --threads
  - "{sqlmap_threads}"
  - --risk
  - "2"
  - --level
  - "3"
  - --ignore-code
  - "401"
  - --output-dir
  - "{output_dir}"
output_parser: raw
artifact_type: vulnerabilities
default_timeout: 1800
