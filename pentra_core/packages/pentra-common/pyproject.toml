[project]
name = "pentra-common"
version = "0.1.0"
description = "Shared library for the Pentra platform — schemas, DB, auth, config, events"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6,<3",
    "pydantic-settings>=2.2,<3",
    "sqlalchemy[asyncio]>=2.0,<3",
    "asyncpg>=0.29,<1",
    "pydantic[email]>=2.6",
    "python-jose[cryptography]>=3.3,<4",
    "passlib[bcrypt]>=1.7,<2",
    "redis>=5.0,<6",
    "httpx>=0.27,<1",
    "openai>=1.107.0,<2",
    "anthropic>=0.60.0,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pentra_common"]
